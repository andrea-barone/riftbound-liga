<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a2c" />
  <title>Store Championships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site">
    <a class="brand" id="brand-link" href="./">
      <span class="brand-mark" id="brand-mark">DAS<br>BRETT</span>
      <span class="brand-sub" id="brand-sub">Spielebar</span>
    </a>
    <div class="divider"></div>
    <div class="title">
      <h1 id="page-title">Store Championships</h1>
      <div class="subtitle" id="page-subtitle">Season points across all active ligas</div>
    </div>
    <div class="toolbar">
      <a id="admin-link" href="./admin.html">Admin</a>
    </div>
  </header>

  <main>
    <div id="content">
      <section class="card"><div class="empty">Loading…</div></section>
    </div>
  </main>

  <footer class="site">
    Updates whenever an admin posts new daily standings · Last refreshed
    <span id="refreshed-at"></span>
  </footer>

  <script type="module">
    import {
      getOrganizations, getOrganizationBySlug, getTournaments,
      getPlayers, getStandings, computeLeaderboard, el, fmtDate
    } from "./app.js";

    const params = new URLSearchParams(location.search);
    const orgSlug = (params.get("org") || "").toLowerCase();

    async function render() {
      if (orgSlug) {
        await renderOrgPage(orgSlug);
      } else {
        await renderDirectory();
      }
      document.getElementById("refreshed-at").textContent = new Date().toLocaleString();
    }

    // ============ Single-org leaderboards ============
    async function renderOrgPage(slug) {
      const org = await getOrganizationBySlug(slug);
      const content = document.getElementById("content");
      content.innerHTML = "";

      if (!org) {
        document.getElementById("page-title").textContent = "Not found";
        document.getElementById("page-subtitle").textContent = "";
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "status err" },
            `No organization with slug "${slug}". Check the link or visit the home page for the directory.`)));
        return;
      }

      // Header swap to the org's identity
      document.title = `${org.name} · Championships`;
      document.getElementById("page-title").textContent = org.name;
      document.getElementById("page-subtitle").textContent = "Season points across all active ligas";

      // Brand strip stays "Das Brett" only when the slug IS dasbrett — otherwise we
      // hide the brand mark to make the page feel owned by the visiting org.
      if (slug !== "dasbrett") {
        document.getElementById("brand-mark").style.display = "none";
        document.getElementById("brand-sub").style.display = "none";
      }

      const tournaments = await getTournaments(org.id);
      if (tournaments.length === 0) {
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "empty" }, "No ligas posted yet. Check back soon.")));
        return;
      }
      const datasets = await Promise.all(tournaments.map(async t => {
        const [players, { days, standings }] = await Promise.all([
          getPlayers(t.id), getStandings(t.id),
        ]);
        return { t, players, days, standings };
      }));
      datasets.forEach(ds => content.appendChild(renderLeague(ds)));
    }

    function renderLeague({ t, players, days, standings }) {
      const card = el("section", { class: "card" });
      card.appendChild(el("h2", {}, t.name));

      const rows = computeLeaderboard(players, standings);
      if (rows.length === 0) {
        card.appendChild(el("div", { class: "empty" }, "No qualifier results posted yet."));
        return card;
      }

      const table = el("table");
      const thead = el("thead");
      thead.appendChild(el("tr", {}, [
        el("th", {}, "#"),
        el("th", {}, "Player"),
        el("th", {}, "Total"),
        el("th", {}, "Days"),
        ...days.map(d =>
          el("th", { class: "day", title: d.name },
            d.event_date ? fmtDate(d.event_date) : d.name)
        ),
      ]));
      table.appendChild(thead);

      const tbody = el("tbody");
      rows.forEach((r, i) => {
        const tr = el("tr");
        tr.appendChild(el("td", { class: "rank" }, String(i + 1)));
        tr.appendChild(el("td", { class: "player" }, r.name));
        tr.appendChild(el("td", { class: "total" }, String(r.totalPoints)));
        tr.appendChild(el("td", { class: "attended" }, String(r.daysAttended)));
        days.forEach(d => {
          const e = r.perDay[d.id];
          const cell = el("td", { class: "day" + (e ? " has" : "") });
          if (e) {
            cell.appendChild(el("div", { class: "pts" }, String(e.points)));
            cell.appendChild(el("div", { class: "plc" }, `#${e.placement}`));
          } else {
            cell.appendChild(el("span", { class: "muted" }, "—"));
          }
          tr.appendChild(cell);
        });
        tbody.appendChild(tr);

        if (i + 1 === t.cut_size && rows.length > t.cut_size) {
          tr.classList.add("cut-line");
          tbody.appendChild(el("tr", { class: "cut-label" }, [
            el("td", { colspan: 4 + days.length },
              `▼ Cut line — top ${t.cut_size} advance to finals ▼`)
          ]));
        }
      });
      table.appendChild(tbody);
      card.appendChild(table);
      return card;
    }

    // ============ No slug → directory of organizations ============
    async function renderDirectory() {
      document.getElementById("page-title").textContent = "Store Championships";
      document.getElementById("page-subtitle").textContent = "Pick an organization to see its leaderboards";

      const content = document.getElementById("content");
      content.innerHTML = "";
      const orgs = await getOrganizations();
      if (orgs.length === 0) {
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "empty" },
            "No organizations yet. If you're an admin, sign in and create one.")));
        return;
      }
      const card = el("section", { class: "card" });
      card.appendChild(el("h2", {}, "Organizations"));
      const list = el("div", { class: "org-list" });
      orgs.forEach(o => {
        const row = el("a", { class: "org-link", href: `?org=${encodeURIComponent(o.slug)}` }, [
          el("strong", {}, o.name),
          el("span", { class: "meta" }, ` · /${o.slug}`),
        ]);
        list.appendChild(row);
      });
      card.appendChild(list);
      content.appendChild(card);
    }

    render().catch(err => {
      console.error(err);
      document.getElementById("content").innerHTML =
        `<section class="card"><div class="status err">Couldn't load: ${err.message || err}. ` +
        `Make sure <code>config.js</code> points at your Supabase project and both schema files have been applied.</div></section>`;
    });
  </script>
</body>
</html>
