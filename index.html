<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Store Championships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site">
    <a class="brand" href="./">Championships</a>
    <nav class="nav">
      <a href="./admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <div class="page-hero">
      <h1 id="page-title">Store Championships</h1>
      <div class="subtitle" id="page-subtitle">Season points across all active ligas</div>
    </div>

    <div id="tabs-host"></div>
    <div id="content">
      <section class="card"><div class="empty">Loading…</div></section>
    </div>
  </main>

  <!-- Event details popover (centered modal with backdrop) -->
  <div id="event-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title-el">
    <div class="modal" id="modal-card">
      <button class="modal-close" id="modal-close-btn" aria-label="Close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer class="site">
    Updates whenever an admin posts new daily standings · Last refreshed
    <span id="refreshed-at"></span>
  </footer>

  <script type="module">
    import {
      getOrganizations, getOrganizationBySlug,
      getGameSystems, getTournaments, getEvents, expandEventsToOccurrences,
      getPlayers, getStandings, computeLeaderboard, el, fmtDate
    } from "./app.js";

    const params = new URLSearchParams(location.search);
    const orgSlug = (params.get("org") || "").toLowerCase();
    const initialSys = (params.get("sys") || "").toLowerCase();

    async function render() {
      if (orgSlug) {
        await renderOrgPage(orgSlug, initialSys || null);
      } else {
        await renderDirectory();
      }
      document.getElementById("refreshed-at").textContent = new Date().toLocaleString();
    }

    // ============ Single-org leaderboards ============
    async function renderOrgPage(slug, activeSys) {
      const org = await getOrganizationBySlug(slug);
      const content = document.getElementById("content");
      const tabsHost = document.getElementById("tabs-host");
      content.innerHTML = "";
      tabsHost.innerHTML = "";

      if (!org) {
        document.getElementById("page-title").textContent = "Not found";
        document.getElementById("page-subtitle").textContent = "";
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "status err" },
            `No organization with slug "${slug}". Check the link or visit the home page for the directory.`)));
        return;
      }

      // Swap page title to the org's identity
      document.title = `${org.name} · Championships`;
      document.getElementById("page-title").textContent = org.name;
      document.getElementById("page-subtitle").textContent = "Season points across all active ligas";

      // Fetch systems, all tournaments, and all events in parallel
      const [systems, tournaments, allEvents] = await Promise.all([
        getGameSystems(org.id),
        getTournaments(org.id),
        getEvents(org.id),
      ]);

      // If the requested ?sys isn't a configured system, treat as "All"
      if (activeSys && !systems.find(s => s.key === activeSys)) activeSys = null;

      // Render tabs only when there are 2+ systems
      if (systems.length >= 2) {
        tabsHost.appendChild(renderTabs(slug, systems, activeSys));
      }

      // Filter tournaments by tab
      const filteredTournaments = activeSys
        ? tournaments.filter(t => t.game_system_key === activeSys)
        : tournaments;

      // Filter events by tab. An event with no system is system-agnostic — it
      // shows in every tab.
      const filteredEvents = activeSys
        ? allEvents.filter(e => !e.game_system_key || e.game_system_key === activeSys)
        : allEvents;

      // Load standings for the visible ligas (parallel)
      const datasets = await Promise.all(filteredTournaments.map(async t => {
        const [players, { days, standings }] = await Promise.all([
          getPlayers(t.id), getStandings(t.id),
        ]);
        return { t, players, days, standings };
      }));

      // Calendar at the top of the body.
      content.appendChild(renderCalendarCard(datasets, systems, filteredEvents));

      if (filteredTournaments.length === 0 && filteredEvents.length === 0) {
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "empty" }, "Nothing in this view yet.")));
        return;
      }

      datasets.forEach(ds => content.appendChild(renderLeague(ds, systems)));
    }

    function renderTabs(slug, systems, activeSys) {
      const wrap = el("div", { class: "tabs" });
      const make = (key, label) => {
        const isActive = activeSys === key || (!activeSys && key === null);
        const href = key
          ? `?org=${encodeURIComponent(slug)}&sys=${encodeURIComponent(key)}`
          : `?org=${encodeURIComponent(slug)}`;
        return el("a", { class: "tab" + (isActive ? " active" : ""), href }, label);
      };
      wrap.appendChild(make(null, "All"));
      systems.forEach(s => wrap.appendChild(make(s.key, s.label)));
      return wrap;
    }

    function renderLeague({ t, players, days, standings }, systems) {
      const card = el("section", { class: "card" });
      const header = el("div", { class: "league-header" });
      header.appendChild(el("h2", {}, t.name));
      if (t.game_system_key) {
        const sys = systems.find(s => s.key === t.game_system_key);
        const label = sys ? sys.label : t.game_system_key;
        header.appendChild(el("span", { class: "pill" }, label));
      }
      card.appendChild(header);

      const rows = computeLeaderboard(players, standings);
      if (rows.length === 0) {
        card.appendChild(el("div", { class: "empty" }, "No qualifier results posted yet."));
        return card;
      }

      const table = el("table");
      const thead = el("thead");
      thead.appendChild(el("tr", {}, [
        el("th", {}, "#"),
        el("th", {}, "Player"),
        el("th", {}, "Total"),
        el("th", {}, "Days"),
        ...days.map(d =>
          el("th", { class: "day", title: d.name },
            d.event_date ? fmtDate(d.event_date) : d.name)
        ),
      ]));
      table.appendChild(thead);

      const tbody = el("tbody");
      rows.forEach((r, i) => {
        const tr = el("tr");
        tr.appendChild(el("td", { class: "rank" }, String(i + 1)));
        tr.appendChild(el("td", { class: "player" }, r.name));
        tr.appendChild(el("td", { class: "total" }, String(r.totalPoints)));
        tr.appendChild(el("td", { class: "attended" }, String(r.daysAttended)));
        days.forEach(d => {
          const e = r.perDay[d.id];
          const cell = el("td", { class: "day" + (e ? " has" : "") });
          if (e) {
            cell.appendChild(el("div", { class: "pts" }, String(e.points)));
            cell.appendChild(el("div", { class: "plc" }, `#${e.placement}`));
          } else {
            cell.appendChild(el("span", { class: "muted" }, "—"));
          }
          tr.appendChild(cell);
        });
        tbody.appendChild(tr);

        if (i + 1 === t.cut_size && rows.length > t.cut_size) {
          tr.classList.add("cut-line");
          tbody.appendChild(el("tr", { class: "cut-label" }, [
            el("td", { colspan: 4 + days.length },
              `▼ Cut line — top ${t.cut_size} advance to finals ▼`)
          ]));
        }
      });
      table.appendChild(tbody);
      card.appendChild(table);
      return card;
    }

    // ============ Calendar ============

    // Date helpers — work in local time. event_date comes in as "YYYY-MM-DD".
    function parseISODate(s) {
      const [y, m, d] = s.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function ymdKey(d) {
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${m}-${day}`;
    }
    function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
    function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, 1); }
    function monthLabel(d) {
      return d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear()
          && a.getMonth() === b.getMonth()
          && a.getDate() === b.getDate();
    }

    function collectChampionshipDays(datasets, systems) {
      // Build a flat list of championship-day entries from qualifier days
      // that have dates set.
      const out = [];
      datasets.forEach(({ t, days }) => {
        days.forEach(d => {
          if (!d.event_date) return;
          const sys = systems.find(s => s.key === t.game_system_key);
          out.push({
            kind: "championship",
            date: parseISODate(d.event_date),
            dayName: d.name,
            ligaName: t.name,
            systemLabel: sys ? sys.label : null,
          });
        });
      });
      return out;
    }

    function renderCalendarCard(datasets, systems, rawEvents) {
      const championshipChips = collectChampionshipDays(datasets, systems);
      const card = el("section", { class: "card calendar-card" });
      card.appendChild(el("h2", {}, "Calendar"));

      // Default view: the month containing the next upcoming championship
      // day (or one-off event), falling back to today.
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const upcomingDates = [
        ...championshipChips.filter(c => c.date >= today).map(c => c.date),
        ...rawEvents.filter(e => e.kind === "oneoff" && e.event_date)
                    .map(e => parseISODate(e.event_date))
                    .filter(d => d >= today),
      ].sort((a, b) => a - b);
      let viewDate = startOfMonth(upcomingDates[0] || today);

      const body = el("div", { class: "calendar-body" });
      card.appendChild(body);

      function render() {
        body.innerHTML = "";

        // Header
        const header = el("div", { class: "calendar-header" });
        header.appendChild(el("button", {
          class: "secondary small", "aria-label": "Previous month",
          onclick: () => { viewDate = addMonths(viewDate, -1); render(); }
        }, "‹"));
        header.appendChild(el("div", { class: "calendar-month" }, monthLabel(viewDate)));
        header.appendChild(el("button", {
          class: "secondary small", "aria-label": "Next month",
          onclick: () => { viewDate = addMonths(viewDate, 1); render(); }
        }, "›"));
        body.appendChild(header);

        // Weekday labels
        const wh = el("div", { class: "calendar-grid calendar-weekdays" });
        ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(w =>
          wh.appendChild(el("div", { class: "calendar-weekday" }, w)));
        body.appendChild(wh);

        // 6×7 grid bounds — Monday of week containing day 1 through Sunday of week +5.
        const firstWeekdayMonZero = (viewDate.getDay() + 6) % 7;
        const gridStart = new Date(viewDate);
        gridStart.setDate(viewDate.getDate() - firstWeekdayMonZero);
        const gridEnd = new Date(gridStart);
        gridEnd.setDate(gridStart.getDate() + 41);

        // Expand events (one-off + recurring) into per-date occurrences
        // within the visible grid range. Then build event chips.
        const occurrences = expandEventsToOccurrences(rawEvents, gridStart, gridEnd);
        const eventChips = occurrences.map(({ date, event }) => {
          const sys = systems.find(s => s.key === event.game_system_key);
          return {
            kind: "event",
            date,
            name: event.name,
            startTime: event.start_time ? event.start_time.slice(0, 5) : null,
            endTime:   event.end_time   ? event.end_time.slice(0, 5)   : null,
            systemLabel: sys ? sys.label : null,
            description: event.description,
            link: event.link_url,
          };
        });

        // Bucket all chips (championship + events) by yyyy-mm-dd
        const byDay = new Map();
        const addChip = (c) => {
          const k = ymdKey(c.date);
          if (!byDay.has(k)) byDay.set(k, []);
          byDay.get(k).push(c);
        };
        championshipChips.forEach(addChip);
        eventChips.forEach(addChip);

        // Inside a day, championships come first, then events, then by name.
        byDay.forEach(arr => arr.sort((a, b) => {
          if (a.kind !== b.kind) return a.kind === "championship" ? -1 : 1;
          return (a.dayName || a.name).localeCompare(b.dayName || b.name);
        }));

        const grid = el("div", { class: "calendar-grid" });
        for (let i = 0; i < 42; i++) {
          const d = new Date(gridStart);
          d.setDate(gridStart.getDate() + i);
          const inMonth = d.getMonth() === viewDate.getMonth();
          const isToday = sameDay(d, today);
          const cell = el("div", {
            class: "calendar-cell"
              + (inMonth ? "" : " out")
              + (isToday ? " today" : "")
          });
          cell.appendChild(el("div", { class: "calendar-date" }, String(d.getDate())));
          (byDay.get(ymdKey(d)) || []).forEach(c => {
            cell.appendChild(buildChip(c));
          });
          grid.appendChild(cell);
        }
        body.appendChild(grid);

        if (byDay.size === 0) {
          body.appendChild(el("div", { class: "muted", style: "padding:12px 4px 0; font-size:13px;" },
            "Nothing scheduled this month."));
        }
      }
      render();
      return card;
    }

    function buildChip(c) {
      if (c.kind === "championship") {
        const parts = [c.ligaName, c.dayName];
        if (c.systemLabel) parts.push(c.systemLabel);
        const text = parts.join(" · ");
        return el("button", {
          class: "calendar-event championship",
          type: "button",
          onclick: () => openChipModal(c),
        }, text);
      }
      const parts = [];
      if (c.startTime) parts.push(c.startTime);
      parts.push(c.name);
      if (c.systemLabel) parts.push(c.systemLabel);
      const text = parts.join(" · ");
      return el("button", {
        class: "calendar-event event",
        type: "button",
        onclick: () => openChipModal(c),
      }, text);
    }

    // ============ Event detail modal ============

    const modal     = document.getElementById("event-modal");
    const modalContent = document.getElementById("modal-content");
    document.getElementById("modal-close-btn").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.style.display !== "none") closeModal();
    });

    function closeModal() {
      modal.style.display = "none";
      modalContent.innerHTML = "";
    }

    function openChipModal(c) {
      modalContent.innerHTML = "";

      if (c.kind === "championship") {
        // Championship-day details
        modalContent.appendChild(el("h3", { class: "modal-title", id: "modal-title-el" }, c.ligaName));
        const meta = el("div", { class: "modal-meta" });
        meta.appendChild(el("strong", {}, c.dayName));
        meta.appendChild(el("span", { class: "muted" }, " · " + longDate(c.date)));
        modalContent.appendChild(meta);
        if (c.systemLabel) {
          modalContent.appendChild(el("div", { class: "modal-pills" },
            el("span", { class: "pill" }, c.systemLabel)));
        }
        modalContent.appendChild(el("p", { class: "modal-note muted" },
          "Standings will appear on the leaderboard after this day."));
      } else {
        // Event details
        modalContent.appendChild(el("h3", { class: "modal-title", id: "modal-title-el" }, c.name));

        const lines = [];
        // Date line: full date for one-off, "Every Mondays" for recurring (single occurrence)
        lines.push(longDate(c.date));
        if (c.startTime || c.endTime) {
          lines.push((c.startTime || "") + (c.endTime ? "–" + c.endTime : ""));
        }
        const meta = el("div", { class: "modal-meta" }, lines.join(" · "));
        modalContent.appendChild(meta);

        if (c.systemLabel) {
          modalContent.appendChild(el("div", { class: "modal-pills" },
            el("span", { class: "pill" }, c.systemLabel)));
        }
        if (c.description) {
          modalContent.appendChild(el("p", { class: "modal-desc" }, c.description));
        }
        if (c.link) {
          modalContent.appendChild(el("a", {
            class: "modal-cta",
            href: c.link,
            target: "_blank",
            rel: "noopener",
          }, "Register →"));
        }
      }

      modal.style.display = "flex";
    }

    function longDate(d) {
      return d.toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric", year: "numeric",
      });
    }

    // ============ No slug → directory of organizations ============
    async function renderDirectory() {
      document.getElementById("page-title").textContent = "Store Championships";
      document.getElementById("page-subtitle").textContent = "Pick an organization to see its leaderboards";

      const content = document.getElementById("content");
      content.innerHTML = "";
      const orgs = await getOrganizations();
      if (orgs.length === 0) {
        content.appendChild(el("section", { class: "card" },
          el("div", { class: "empty" },
            "No organizations yet. If you're an admin, sign in and create one.")));
        return;
      }
      const card = el("section", { class: "card" });
      card.appendChild(el("h2", {}, "Organizations"));
      const list = el("div", { class: "org-list" });
      orgs.forEach(o => {
        const row = el("a", { class: "org-link", href: `?org=${encodeURIComponent(o.slug)}` }, [
          el("strong", {}, o.name),
          el("span", { class: "meta" }, ` · /${o.slug}`),
        ]);
        list.appendChild(row);
      });
      card.appendChild(list);
      content.appendChild(card);
    }

    render().catch(err => {
      console.error(err);
      document.getElementById("content").innerHTML =
        `<section class="card"><div class="status err">Couldn't load: ${err.message || err}. ` +
        `Make sure <code>config.js</code> points at your Supabase project and all three schema files have been applied.</div></section>`;
    });
  </script>
</body>
</html>
